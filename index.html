<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Hindi Legal Editor</title>
    <style>
        body {
            background-color: #525659;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .toolbar {
            position: sticky;
            top: 10px;
            background: #ffffff;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            z-index: 1000;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 25px;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #34495e; transform: translateY(-2px); }
        button#micBtn.active { background-color: #e74c3c; animation: pulse 1.5s infinite; }

        .paper {
            background: white;
            width: 215.9mm; 
            height: 355.6mm; 
            padding: 25mm 20mm 30px 20mm; 
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: #000;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden; 
        }

        [contenteditable="true"] { 
            outline: none; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            line-height: 1.8;
            text-align: justify;
        }

        .header { 
            text-align: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; 
            pointer-events: none; user-select: none; 
        }
        
        /* FIXED TYPING LIMIT: This ensures space is left for footer/buttons */
        .document-body { 
            width: 100%;
            max-height: 250mm; /* Adjust this to leave more or less bottom space */
            overflow: hidden;
        }

        .point-container { display: flex; align-items: flex-start; margin-top: 12px; width: 100%; }
        .point-number { min-width: 35px; font-weight: bold; }
        .point-text { flex: 1; display: block; width: 100%; }

        .footer-container {
            margin-top: auto; 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 20px; 
            width: 100%;
            background: white;
            min-height: 40mm; /* Reserved space for Signature */
        }

        .del-page {
            position: absolute; right: 10px; top: 10px;
            background: #ff4757; font-size: 10px; padding: 5px 10px; border-radius: 5px;
        }

        @media print {
            @page { size: legal; margin: 0; }
            .toolbar, .no-print, .del-page { display: none !important; }
            body { background: white; padding: 0; }
            .paper { box-shadow: none; margin: 0; page-break-after: always; height: 355.6mm !important; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="startVoice()" id="micBtn">🎤 आवाज़ (Voice)</button>
        <button onclick="addPoint()">🔢 पॉइंट जोड़ें</button>
        <button onclick="insertNewPageManual()" style="background-color: #8e44ad;">📄 नया पेज</button>
        <button onclick="changeAlignment()" style="background-color: #3498db;">↔️ संरेखण</button>
        <button onclick="window.print()" style="background-color: #27ae60;">💾 प्रिंट / PDF</button>
    </div>

    <div id="main-container">
        <div class="paper" id="page-1">
            <div class="header">न्यायालय किराया अधिकरण, जयपुर महानगर (द्वितीय)</div>
            <div class="case-info" contenteditable="true">मुकदमा नं. ________ / 2026</div>
            <div class="parties" contenteditable="true">उदय सिंह शेखावत बनाम रामचन्द्र</div>
            <div class="subject" contenteditable="true">दावा बाबत् बेदखली व किराया</div>

            <div class="document-body">
                <div contenteditable="true" style="margin-bottom: 10px;">श्रीमान जी, <br> प्रार्थिया की ओर से निवेदन निम्न प्रकार है :-</div>
                <div class="point-container">
                    <div class="point-number">1.</div>
                    <div class="point-text" contenteditable="true" oninput="checkLimit(this)">यह कि उक्त उनवानी अर्जी आज माननीय न्यायालय के समक्ष नियत है।</div>
                </div>
            </div>

            <div id="master-footer" class="footer-container">
                <div class="location-date">
                    <div contenteditable="true">जयपुर</div>
                    <div>दिनांक : <input type="text" id="date-field" placeholder="DD/MM/YYYY" style="border:none; border-bottom:1px dashed #ccc;"></div>
                </div>
                <div class="signature" contenteditable="true" style="text-align: right;"><b>प्रार्थी</b><br><br>( उदय सिंह शेखावत )</div>
            </div>
        </div>
    </div>

    <script>
        let recognition;
        let isListening = false;

        // FIXED LIMIT CHECK
        function checkLimit(el) {
            const body = el.closest('.document-body');
            // If the content height exceeds our fixed max-height (250mm)
            if (body.scrollHeight > body.offsetHeight) {
                const paper = el.closest('.paper');
                insertNewPageAfter(paper);
            }
        }

        function insertNewPageAfter(currentPaper) {
            const newPage = document.createElement('div');
            newPage.className = 'paper';
            newPage.innerHTML = `
                <button class="del-page no-print" onclick="deleteThisPage(this)">डिलीट</button>
                <div class="header"></div>
                <div class="document-body next-page-body" contenteditable="true" oninput="checkLimit(this)"></div>
            `;
            
            currentPaper.after(newPage);
            moveFooterToLastPage();
            renumberAll();
            
            const nextBody = newPage.querySelector('.next-page-body');
            nextBody.focus();
        }

        function insertNewPageManual() {
            const papers = document.querySelectorAll('.paper');
            insertNewPageAfter(papers[papers.length - 1]);
        }

        function moveFooterToLastPage() {
            const footer = document.getElementById('master-footer');
            const papers = document.querySelectorAll('.paper');
            const lastPage = papers[papers.length - 1];
            if (footer && lastPage) lastPage.appendChild(footer);
        }

        function renumberAll() {
            document.querySelectorAll('.point-number').forEach((num, i) => { num.innerText = (i + 1) + "."; });
            document.querySelectorAll('.paper').forEach((page, i) => {
                const h = page.querySelector('.header');
                if(i > 0) h.innerText = `- ${i + 1} -`;
            });
        }

        function deleteThisPage(btn) {
            if(confirm("पेज डिलीट करें?")) {
                btn.parentElement.remove();
                moveFooterToLastPage();
                renumberAll();
            }
        }

        function addPoint() {
            const papers = document.querySelectorAll('.paper');
            const lastPaper = papers[papers.length - 1];
            const body = lastPaper.querySelector('.document-body');
            const div = document.createElement('div');
            div.className = "point-container";
            div.innerHTML = `<div class="point-number"></div><div class="point-text" contenteditable="true" oninput="checkLimit(this)"></div>`;
            body.appendChild(div);
            renumberAll();
            div.querySelector('.point-text').focus();
        }

        function changeAlignment() {
            let sel = window.getSelection();
            if (sel.rangeCount > 0) {
                let target = sel.anchorNode.parentElement.closest('[contenteditable="true"]');
                if (target) {
                    const aligns = ['left', 'center', 'right', 'justify'];
                    const current = target.style.textAlign || 'left';
                    target.style.textAlign = aligns[(aligns.indexOf(current) + 1) % 4];
                }
            }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = true;
            recognition.onresult = (e) => {
                document.execCommand('insertText', false, e.results[e.results.length - 1][0].transcript + ' ');
                const active = document.activeElement;
                if(active) checkLimit(active);
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('active');
            };
        }

        function startVoice() {
            if (isListening) recognition.stop();
            else { recognition.start(); isListening = true; document.getElementById('micBtn').classList.add('active'); }
        }
    </script>
</body>
</html>
